services:
  app:
    build:
      context: ./app_v2
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_ROOT=/app/data
      - NODE_ENV=production
    networks:
      - ss-network

  updater:
    build:
      context: ./updater_v2
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./tools:/app/tools:ro
    environment:
      - DATA_ROOT=/app/data
      - APP_INTERNAL_URL=http://app:3000
      - WEBHOOK_PORT=3001
    networks:
      - ss-network

networks:
  ss-network:
    driver: bridge
